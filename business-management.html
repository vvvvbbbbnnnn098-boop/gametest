<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бизнес Империя — без сырья</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(20, 20, 40, 0.7);
            border-radius: 20px;
            border: 2px solid #2196F3;
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.1);
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.2);
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(33, 150, 243, 0.2);
            border-color: #2196F3;
        }
        
        .header h1 {
            color: #2196F3;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(33, 150, 243, 0.3);
        }
        
        .character-section {
            background: rgba(30, 30, 50, 0.9);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #2196F3;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }
        
        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 5px;
        }
        
        .stat-card .label {
            color: #aaa;
            font-size: 0.9em;
        }
        
        .business-panel {
            background: rgba(30, 30, 50, 0.9);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #2196F3;
            margin-bottom: 30px;
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(33, 150, 243, 0.3);
        }
        
        .income-display {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(33, 150, 243, 0.2));
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid #4CAF50;
        }
        
        .income-display .hourly {
            font-size: 1.3em;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .income-display .total {
            font-size: 1.1em;
            color: #ffcc00;
            margin-top: 5px;
        }
        
        .business-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .business-card {
            background: rgba(40, 40, 60, 0.9);
            border-radius: 20px;
            padding: 25px;
            border: 2px solid #2196F3;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .business-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(33, 150, 243, 0.3);
        }
        
        .business-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #2196F3, #4CAF50);
        }
        
        .business-icon {
            font-size: 3.5em;
            text-align: center;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 10px rgba(33, 150, 243, 0.3));
        }
        
        .business-name {
            font-size: 1.4em;
            color: #2196F3;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .business-desc {
            color: #aaa;
            font-size: 0.9em;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        .business-stats {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .stat-label {
            color: #aaa;
        }
        
        .stat-value {
            font-weight: bold;
        }
        
        .level-badge {
            background: rgba(255, 193, 7, 0.2);
            color: #ffcc00;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        
        .collect-btn {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            max-width: 300px;
            margin: 20px auto 0;
            display: block;
        }
        
        .collect-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }
        
        .collect-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 50, 0.95);
            border-left: 4px solid #2196F3;
            border-radius: 10px;
            padding: 20px;
            max-width: 300px;
            transform: translateX(100%);
            transition: transform 0.3s;
            z-index: 1100;
            backdrop-filter: blur(10px);
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification-title {
            color: #2196F3;
            font-size: 1.1em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notification-message {
            color: #ccc;
            font-size: 0.95em;
            line-height: 1.4;
        }
        
        .profit-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            border: 1px solid #4CAF50;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 10px 20px;
            background: rgba(33, 150, 243, 0.1);
            border: 1px solid rgba(33, 150, 243, 0.3);
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: rgba(33, 150, 243, 0.2);
        }
        
        .tab.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Скрываем старые ресурсные блоки */
        .resources-section, #resourcesList, #tab-resources {
            display: none !important;
        }
        
        /* Оставляем только две вкладки */
        .tab:nth-child(2) {
            display: none;
        }
        
        @media (max-width: 768px) {
            .business-grid {
                grid-template-columns: 1fr;
            }
            
            .business-header {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <div class="header">
            <a href="game-world.html" class="back-btn">← Назад в игру</a>
            <h1>🏢 БИЗНЕС ИМПЕРИЯ</h1>
            <p>Стройте свою бизнес-империю и получайте пассивный доход!</p>
        </div>
        
        <!-- Информация о персонаже -->
        <div class="character-section">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
                <div>
                    <h2 id="characterName" style="color: #2196F3;">Загрузка...</h2>
                    <p id="characterClass" style="color: #aaa;">...</p>
                </div>
                <div class="stats-grid" style="margin-top: 0; width: auto;">
                    <div class="stat-card" style="min-width: 150px;">
                        <div class="value" id="moneyValue">0</div>
                        <div class="label">💰 Текущий баланс</div>
                    </div>
                    <div class="stat-card" style="min-width: 150px;">
                        <div class="value" id="totalInvested">0 ₽</div>
                        <div class="label">📊 Всего инвестировано</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Вкладки (теперь только две: Бизнесы и История) -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('businesses')">🏢 Бизнесы</div>
            <div class="tab" onclick="switchTab('history')">📜 История</div>
        </div>
        
        <!-- Вкладка: Бизнесы -->
        <div id="tab-businesses" class="tab-content active">
            <div class="business-panel">
                <div class="business-header">
                    <h2 style="color: #2196F3;">📊 Мои бизнесы</h2>
                    <div class="income-display">
                        <div class="hourly" id="totalIncome">0 ₽/час</div>
                        <div class="total" id="totalEarned">Всего заработано: 0 ₽</div>
                    </div>
                </div>
                
                <!-- Список бизнесов -->
                <div id="businessList" class="business-grid"></div>
                
                <!-- Кнопка сбора дохода -->
                <button class="collect-btn" onclick="collectIncome()" id="collectBtn">
                    💰 Собрать доход сейчас
                </button>
            </div>
        </div>
        
        <!-- Вкладка: История -->
        <div id="tab-history" class="tab-content">
            <div class="business-panel">
                <h2 style="color: #2196F3; margin-bottom: 20px;">📜 История доходов</h2>
                <div class="history-list" id="incomeHistory" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
    
    <!-- Уведомления -->
    <div class="notification" id="notification">
        <div class="notification-title">
            <span id="notificationIcon">📢</span>
            <span id="notificationTitle">Уведомление</span>
        </div>
        <div id="notificationMessage" style="color: #ccc;"></div>
    </div>
    
    <script>
        // ===== ДАННЫЕ О БИЗНЕСАХ (ПОЛНОСТЬЮ БЕЗ ССЫЛОК НА СЫРЬЁ) =====
        const BUSINESS_TYPES = [
            {
                id: 1,
                name: 'Киоск',
                description: 'Небольшой продуктовый киоск. Быстрая окупаемость.',
                icon: '🏪',
                basePrice: 5000,
                baseIncome: 100,
                level: 0,
                maxLevel: 5,
                priceMultiplier: 1.5,
                incomeMultiplier: 1.3
            },
            {
                id: 2,
                name: 'Кафе',
                description: 'Уютное кафе. Стабильный поток клиентов.',
                icon: '☕',
                basePrice: 15000,
                baseIncome: 400,
                level: 0,
                maxLevel: 5,
                priceMultiplier: 1.6,
                incomeMultiplier: 1.4
            },
            {
                id: 3,
                name: 'Магазин',
                description: 'Продуктовый магазин. Большой ассортимент.',
                icon: '🏬',
                basePrice: 30000,
                baseIncome: 1000,
                level: 0,
                maxLevel: 5,
                priceMultiplier: 1.7,
                incomeMultiplier: 1.5
            },
            {
                id: 4,
                name: 'Ресторан',
                description: 'Элитный ресторан. Высокая маржинальность.',
                icon: '🍽️',
                basePrice: 75000,
                baseIncome: 2500,
                level: 0,
                maxLevel: 5,
                priceMultiplier: 1.8,
                incomeMultiplier: 1.6
            },
            {
                id: 5,
                name: 'Отель',
                description: 'Комфортабельный отель. Премиум-услуги.',
                icon: '🏨',
                basePrice: 150000,
                baseIncome: 6000,
                level: 0,
                maxLevel: 5,
                priceMultiplier: 1.9,
                incomeMultiplier: 1.7
            },
            {
                id: 6,
                name: 'Завод',
                description: 'Промышленное производство. Максимальная прибыль.',
                icon: '🏭',
                basePrice: 300000,
                baseIncome: 15000,
                level: 0,
                maxLevel: 5,
                priceMultiplier: 2.0,
                incomeMultiplier: 1.8
            }
        ];
        
        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let activeCharacter = null;
        let characterStats = null;
        let userBusinesses = [];
        let incomeHistory = [];
        
        // ===== ЗАГРУЗКА ДАННЫХ =====
        function loadData() {
            const savedCharacter = localStorage.getItem('activeCharacter');
            if (savedCharacter) {
                try {
                    activeCharacter = JSON.parse(savedCharacter);
                } catch (e) {
                    showNotification('❌ Ошибка', 'Не удалось загрузить персонажа', '❌');
                    setTimeout(() => window.location.href = 'game-world.html', 2000);
                    return false;
                }
            } else {
                showNotification('❌ Ошибка', 'Персонаж не выбран', '❌');
                setTimeout(() => window.location.href = 'game-world.html', 2000);
                return false;
            }
            
            if (activeCharacter && activeCharacter.id) {
                const statsKey = `characterStats_${activeCharacter.id}`;
                const savedStats = localStorage.getItem(statsKey);
                
                if (savedStats) {
                    try {
                        characterStats = JSON.parse(savedStats);
                    } catch (e) {
                        createDefaultStats();
                    }
                } else {
                    const oldStats = localStorage.getItem('characterStats');
                    if (oldStats) {
                        try {
                            characterStats = JSON.parse(oldStats);
                        } catch (e) {
                            createDefaultStats();
                        }
                    } else {
                        createDefaultStats();
                    }
                }
                
                // Инициализируем бизнес данные (без ресурсов)
                if (!characterStats.business) {
                    characterStats.business = {
                        unlocked: true,
                        businesses: [],
                        lastCollection: Date.now(),
                        totalEarned: 0,
                        history: []
                    };
                }
                
                // Очищаем старые ресурсы, если они есть (на случай перехода с сырьевой версии)
                if (characterStats.business.resources) {
                    delete characterStats.business.resources;
                }
                
                // Инициализируем историю
                if (!characterStats.business.history) {
                    characterStats.business.history = [];
                }
                
                userBusinesses = characterStats.business.businesses || [];
                incomeHistory = characterStats.business.history || [];
                
                updateUI();
                return true;
            }
            
            return false;
        }
        
        function createDefaultStats() {
            characterStats = {
                money: 20000, // чуть больше стартового капитала для покупок
                energy: 100,
                maxEnergy: 100,
                strength: 10,
                luck: 5,
                experience: 0,
                level: 1,
                business: {
                    unlocked: true,
                    businesses: [],
                    lastCollection: Date.now(),
                    totalEarned: 0,
                    history: []
                }
            };
        }
        
        // ===== СОХРАНЕНИЕ ДАННЫХ =====
        function saveData() {
            if (!activeCharacter || !activeCharacter.id || !characterStats) return;
            
            characterStats.business.businesses = userBusinesses;
            characterStats.business.history = incomeHistory;
            // удаляем ресурсы если вдруг затесались
            if (characterStats.business.resources) delete characterStats.business.resources;
            
            const statsKey = `characterStats_${activeCharacter.id}`;
            localStorage.setItem(statsKey, JSON.stringify(characterStats));
            localStorage.setItem('characterStats', JSON.stringify(characterStats));
        }
        
        // ===== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА =====
        function updateUI() {
            if (!activeCharacter || !characterStats) return;
            
            document.getElementById('characterName').textContent = activeCharacter.name || 'Персонаж';
            document.getElementById('characterClass').textContent = `Класс: ${activeCharacter.class || 'Магнат'}`;
            document.getElementById('moneyValue').textContent = (characterStats.money || 0).toLocaleString() + ' ₽';
            
            const totalInvested = calculateTotalInvested();
            document.getElementById('totalInvested').textContent = totalInvested.toLocaleString() + ' ₽';
            
            updateBusinessList();
            updateIncomeInfo();
            updateHistoryList();
        }
        
        // ===== ОБНОВЛЕНИЕ СПИСКА БИЗНЕСОВ (БЕЗ РЕСУРСОВ) =====
        function updateBusinessList() {
            const businessList = document.getElementById('businessList');
            if (!businessList) return;
            
            let html = '';
            
            BUSINESS_TYPES.forEach(business => {
                const userBusiness = userBusinesses.find(b => b.id === business.id);
                const level = userBusiness ? userBusiness.level : 0;
                
                let currentPrice = business.basePrice;
                let currentIncome = business.baseIncome;
                
                for (let i = 0; i < level; i++) {
                    currentPrice = Math.floor(currentPrice * business.priceMultiplier);
                    currentIncome = Math.floor(currentIncome * business.incomeMultiplier);
                }
                
                const nextPrice = level < business.maxLevel ? 
                    Math.floor(currentPrice * business.priceMultiplier) : null;
                const nextIncome = level < business.maxLevel ? 
                    Math.floor(currentIncome * business.incomeMultiplier) : null;
                
                const canBuy = level < business.maxLevel && characterStats.money >= nextPrice;
                
                html += `
                    <div class="business-card">
                        <div class="profit-badge">💰 ${currentIncome} ₽/час</div>
                        <div class="business-icon">${business.icon}</div>
                        <div class="business-name">${business.name}</div>
                        <div class="business-desc">${business.description}</div>
                        
                        <div class="business-stats">
                            <div class="stat-row">
                                <span class="stat-label">Уровень:</span>
                                <span class="stat-value level-badge">${level}/${business.maxLevel}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Доход в час:</span>
                                <span class="stat-value" style="color: #4CAF50;">${currentIncome} ₽</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Всего вложено:</span>
                                <span class="stat-value" style="color: #ff6666;">${calculateTotalInvestment(business, level)} ₽</span>
                            </div>
                        </div>
                        
                        ${level < business.maxLevel ? `
                            <div style="background: rgba(33, 150, 243, 0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                                <div class="stat-row">
                                    <span class="stat-label">Следующий уровень:</span>
                                    <span class="stat-value" style="color: #ffcc00;">+1</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Цена улучшения:</span>
                                    <span class="stat-value" style="color: ${canBuy ? '#4CAF50' : '#ff6666'};">${nextPrice} ₽</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Новый доход:</span>
                                    <span class="stat-value" style="color: #4CAF50;">+${nextIncome - currentIncome} ₽/час</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Окупаемость:</span>
                                    <span class="stat-value" style="color: #ffcc00;">${Math.round(nextPrice / (nextIncome - currentIncome))} ч</span>
                                </div>
                            </div>
                            
                            <button class="resource-btn" onclick="buyBusiness(${business.id})" 
                                style="width: 100%; background: ${canBuy ? 'linear-gradient(135deg, #4CAF50, #2E7D32)' : '#666'}; border: none; border-radius: 8px; padding: 12px; color: white; font-weight: bold; cursor: ${canBuy ? 'pointer' : 'not-allowed'};"
                                ${canBuy ? '' : 'disabled'}>
                                ${level === 0 ? '💰 Купить бизнес' : '📈 Улучшить бизнес'}
                            </button>
                        ` : `
                            <div style="text-align: center; padding: 15px; background: rgba(255, 193, 7, 0.1); border-radius: 10px; color: #ffcc00;">
                                ⭐ Максимальный уровень достигнут!
                            </div>
                        `}
                    </div>
                `;
            });
            
            businessList.innerHTML = html;
        }
        
        // ===== РАСЧЕТ ОБЩИХ ИНВЕСТИЦИЙ =====
        function calculateTotalInvested() {
            let total = 0;
            userBusinesses.forEach(userBusiness => {
                const business = BUSINESS_TYPES.find(b => b.id === userBusiness.id);
                if (business) {
                    total += calculateTotalInvestment(business, userBusiness.level);
                }
            });
            return total;
        }
        
        function calculateTotalInvestment(business, level) {
            let total = 0;
            let price = business.basePrice;
            for (let i = 0; i < level; i++) {
                total += price;
                price = Math.floor(price * business.priceMultiplier);
            }
            return total;
        }
        
        // ===== ОБНОВЛЕНИЕ ИНФОРМАЦИИ О ДОХОДЕ =====
        function updateIncomeInfo() {
            const totalIncome = calculateTotalIncome();
            document.getElementById('totalIncome').textContent = totalIncome.toLocaleString() + ' ₽/час';
            
            const totalEarned = characterStats.business.totalEarned || 0;
            document.getElementById('totalEarned').textContent = `Всего заработано: ${totalEarned.toLocaleString()} ₽`;
        }
        
        function calculateTotalIncome() {
            let total = 0;
            userBusinesses.forEach(userBusiness => {
                const business = BUSINESS_TYPES.find(b => b.id === userBusiness.id);
                if (business) {
                    let income = business.baseIncome;
                    for (let i = 0; i < userBusiness.level; i++) {
                        income = Math.floor(income * business.incomeMultiplier);
                    }
                    total += income;
                }
            });
            return total;
        }
        
        // ===== ПОКУПКА БИЗНЕСА (БЕЗ РЕСУРСОВ) =====
        function buyBusiness(businessId) {
            if (!activeCharacter || !characterStats) {
                showNotification('❌ Ошибка', 'Данные не загружены', '❌');
                return;
            }
            
            const business = BUSINESS_TYPES.find(b => b.id === businessId);
            if (!business) return;
            
            let userBusiness = userBusinesses.find(b => b.id === businessId);
            const currentLevel = userBusiness ? userBusiness.level : 0;
            
            if (currentLevel >= business.maxLevel) {
                showNotification('❌ Ошибка', 'Максимальный уровень достигнут', '❌');
                return;
            }
            
            let price = business.basePrice;
            for (let i = 0; i < currentLevel; i++) {
                price = Math.floor(price * business.priceMultiplier);
            }
            
            if (characterStats.money < price) {
                showNotification('❌ Недостаточно средств', 
                    `Нужно ${price} ₽, у вас ${characterStats.money} ₽`, '💰');
                return;
            }
            
            characterStats.money -= price;
            
            if (userBusiness) {
                userBusiness.level += 1;
            } else {
                userBusinesses.push({
                    id: business.id,
                    level: 1,
                    purchasedAt: Date.now()
                });
            }
            
            saveData();
            updateUI();
            
            showNotification('✅ Успешно!', 
                `${business.name} улучшен до уровня ${currentLevel + 1}!`, '🏢');
        }
        
        // ===== СБОР ДОХОДА (ПРОСТО НАЧИСЛЕНИЕ, БЕЗ РЕСУРСОВ) =====
        function collectIncome() {
            if (!activeCharacter || !characterStats) return;
            
            // Считаем доход за 1 час (можно добавить множитель времени, но для простоты 1 час за клик)
            const totalIncome = calculateTotalIncome();
            
            if (totalIncome <= 0) {
                showNotification('ℹ️ Информация', 
                    'У вас нет бизнесов, приносящих доход', '🏢');
                return;
            }
            
            // Начисляем доход
            characterStats.money += totalIncome;
            characterStats.business.totalEarned = (characterStats.business.totalEarned || 0) + totalIncome;
            characterStats.business.lastCollection = Date.now();
            
            // Добавляем запись в историю
            incomeHistory.push({
                time: Date.now(),
                amount: totalIncome,
                business: 'Сбор дохода',
                hours: 1
            });
            
            // Ограничиваем историю последними 50 записями
            if (incomeHistory.length > 50) {
                incomeHistory = incomeHistory.slice(-50);
            }
            
            saveData();
            updateUI();
            
            showNotification('💰 Доход получен!', 
                `Ваши бизнесы принесли ${totalIncome} ₽!`, '🏢');
        }
        
        // ===== ОБНОВЛЕНИЕ ИСТОРИИ =====
        function updateHistoryList() {
            const historyList = document.getElementById('incomeHistory');
            if (!historyList) return;
            
            if (incomeHistory.length === 0) {
                historyList.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #aaa;">
                        📭 История доходов пуста
                    </div>
                `;
                return;
            }
            
            let html = '';
            incomeHistory.slice().reverse().forEach(entry => {
                const date = new Date(entry.time);
                const timeStr = date.toLocaleString();
                
                html += `
                    <div class="history-item" style="display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <div>
                            <span class="business" style="color: #2196F3;">${entry.business}</span>
                            <span class="time" style="color: #aaa; font-size: 0.9em;"> (${timeStr})</span>
                        </div>
                        <div>
                            <span class="amount" style="color: #4CAF50; font-weight: bold;">+${entry.amount} ₽</span>
                        </div>
                    </div>
                `;
            });
            
            historyList.innerHTML = html;
        }
        
        // ===== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК =====
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Активируем нужную вкладку
            const tabs = document.querySelectorAll('.tab');
            if (tabId === 'businesses') {
                tabs[0].classList.add('active');
                document.getElementById('tab-businesses').classList.add('active');
            } else if (tabId === 'history') {
                tabs[1].classList.add('active');
                document.getElementById('tab-history').classList.add('active');
            }
        }
        
        // ===== УВЕДОМЛЕНИЯ =====
        function showNotification(title, message, icon = '📢') {
            const notification = document.getElementById('notification');
            document.getElementById('notificationIcon').textContent = icon;
            document.getElementById('notificationTitle').textContent = title;
            document.getElementById('notificationMessage').textContent = message;
            
            notification.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                notification.style.transform = 'translateX(100%)';
            }, 3000);
        }
        
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        document.addEventListener('DOMContentLoaded', function() {
            if (loadData()) {
                // Периодическое обновление (раз в минуту обновляем список, но доход только по клику)
                setInterval(() => {
                    updateBusinessList();
                }, 60000);
            }
        });
        
        window.addEventListener('beforeunload', function() {
            saveData();
        });
    </script>
</body>
</html>
