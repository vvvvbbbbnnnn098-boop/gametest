<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персонаж - Мой аккаунт</title>
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        
        .title {
            color: white;
            font-size: 2.5em;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .title span {
            color: #ffcc00;
        }
        
        .content-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            width: 100%;
            justify-content: center;
        }
        
        .navigation-panel {
            background: rgba(20, 20, 20, 0.9);
            border-radius: 15px;
            padding: 25px;
            width: 100%;
            max-width: 1200px;
            border: 1px solid rgba(255, 204, 0, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        
        .nav-title {
            color: #ffcc00;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        
        .nav-card {
            background: rgba(40, 40, 40, 0.8);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }
        
        .nav-card:hover {
            transform: translateY(-5px);
            border-color: #ffcc00;
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.2);
            background: rgba(50, 50, 50, 0.9);
        }
        
        .nav-card.active {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }
        
        .nav-icon {
            font-size: 2em;
            margin-bottom: 5px;
        }
        
        .nav-card-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #ffcc00;
        }
        
        .nav-card-desc {
            font-size: 0.8em;
            color: #aaa;
            line-height: 1.3;
        }
        
        .auth-box {
            background: rgba(20, 20, 20, 0.8);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 204, 0, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .auth-title {
            color: #ffcc00;
            font-size: 1.5em;
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ffcc00;
            font-size: 0.9em;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 204, 0, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ffcc00;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }
        
        .auth-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .auth-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-btn {
            background: #ffcc00;
            color: black;
        }
        
        .register-btn {
            background: transparent;
            color: #ffcc00;
            border: 2px solid #ffcc00;
        }
        
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3);
        }
        
        .user-panel {
            background: rgba(20, 20, 20, 0.8);
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            border: 1px solid rgba(255, 204, 0, 0.3);
            backdrop-filter: blur(10px);
            display: none;
        }
        
        .user-panel.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-info {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .user-info h3 {
            color: #ffcc00;
            margin-bottom: 10px;
        }
        
        .admin-badge-inline {
            display: inline-block;
            background: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            margin-top: 5px;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }
        
        .assistant-badge-inline {
            display: inline-block;
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            margin-top: 5px;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        
        .user-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #ffcc00;
        }
        
        .stat-label {
            font-size: 0.8em;
            color: #aaa;
        }
        
        .character-section {
            margin-top: 30px;
            border-top: 1px solid rgba(255, 204, 0, 0.3);
            padding-top: 25px;
        }
        
        .section-title {
            color: #ffcc00;
            font-size: 1.2em;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .character-card {
            background: rgba(30, 30, 30, 0.8);
            border-radius: 10px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .character-card:hover {
            border-color: #ffcc00;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.2);
        }
        
        .character-card.selected {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }
        
        .character-card.empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            color: #888;
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }
        
        .character-card.empty:hover {
            border-color: #ffcc00;
            color: #ffcc00;
        }
        
        .empty-icon {
            font-size: 2em;
            margin-bottom: 10px;
            opacity: 0.5;
        }
        
        .character-preview {
            width: 80px;
            height: 100px;
            background: rgba(0, 0, 0, 0.5);
            margin: 0 auto 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .character-name {
            font-size: 1.1em;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .character-details {
            font-size: 0.8em;
            color: #aaa;
            text-align: center;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .character-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        
        .character-action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .use-btn {
            background: #ffcc00;
            color: black;
            font-weight: bold;
        }
        
        .edit-btn {
            background: rgba(52, 152, 219, 0.8);
            color: white;
        }
        
        .delete-btn {
            background: rgba(231, 76, 60, 0.8);
            color: white;
        }
        
        .character-action-btn:hover {
            transform: scale(1.05);
        }
        
        .selected-character-info {
            background: rgba(30, 30, 30, 0.8);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border: 2px solid #ffcc00;
            display: none;
        }
        
        .selected-character-info.show {
            display: block;
            animation: slideIn 0.5s;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .selected-char-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .selected-char-title {
            color: #ffcc00;
            font-size: 1.2em;
        }
        
        .selected-char-preview {
            display: flex;
            gap: 30px;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .selected-char-visual {
            width: 120px;
            height: 150px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            border: 3px solid rgba(255, 204, 0, 0.5);
        }
        
        .selected-char-stats {
            flex: 1;
        }
        
        .char-stat-row {
            display: flex;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .char-stat-name {
            width: 120px;
            color: #aaa;
        }
        
        .char-stat-value {
            color: white;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .action-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
        }
        
        .play-btn {
            background: #ffcc00;
            color: black;
        }
        
        .edit-selected-btn {
            background: rgba(52, 152, 219, 0.8);
            color: white;
        }
        
        .new-character-btn {
            background: transparent;
            color: #ffcc00;
            border: 2px solid #ffcc00;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3);
        }
        
        .logout-btn {
            display: block;
            width: 100%;
            background: rgba(255, 50, 50, 0.2);
            color: #ff6666;
            border: 2px solid #ff6666;
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: rgba(255, 50, 50, 0.3);
        }
        
        .admin-console {
            background: rgba(10, 10, 30, 0.9);
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            border: 2px solid rgba(255, 0, 0, 0.5);
            display: none;
        }
        
        .assistant-console {
            border: 2px solid rgba(76, 175, 80, 0.5);
        }
        
        .admin-console.show {
            display: block;
            animation: slideIn 0.5s;
        }
        
        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 0, 0, 0.3);
        }
        
        .assistant-console .console-header {
            border-bottom: 2px solid rgba(76, 175, 80, 0.3);
        }
        
        .console-title {
            color: #ff3333;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .assistant-console .console-title {
            color: #4CAF50;
        }
        
        .console-title i {
            font-size: 1.2em;
        }
        
        .console-toggle {
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }
        
        .assistant-console .console-toggle {
            border: 1px solid #4CAF50;
            color: #4CAF50;
        }
        
        .console-toggle:hover {
            background: rgba(255, 0, 0, 0.1);
        }
        
        .assistant-console .console-toggle:hover {
            background: rgba(76, 175, 80, 0.1);
        }
        
        .console-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .console-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .console-btn.download {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
        }
        
        .console-btn.upload {
            background: linear-gradient(135deg, #2196F3, #0D47A1);
            color: white;
        }
        
        .console-btn.reset {
            background: linear-gradient(135deg, #ff9800, #EF6C00);
            color: white;
        }
        
        .console-btn.admin-panel {
            background: linear-gradient(135deg, #9C27B0, #673AB7);
            color: white;
        }
        
        .console-btn.delete-all {
            background: linear-gradient(135deg, #f44336, #C62828);
            color: white;
        }
        
        .console-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .console-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .console-info pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #00ff00;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .console-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .console-stat {
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }
        
        .console-stat-value {
            font-size: 1.1em;
            font-weight: bold;
            color: #ffcc00;
        }
        
        .console-stat-label {
            font-size: 0.8em;
            color: #aaa;
            margin-top: 5px;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #0f0;
            display: block;
        }
        
        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #f00;
            display: block;
        }
        
        .message.info {
            background: rgba(0, 150, 255, 0.1);
            border: 1px solid rgba(0, 150, 255, 0.3);
            color: #00aaff;
            display: block;
        }
        
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 204, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 204, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255, 204, 0, 0.05) 0%, transparent 50%);
            animation: pulse-bg 8s ease-in-out infinite alternate;
        }
        
        @keyframes pulse-bg {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }
        
        @media (max-width: 768px) {
            .title { font-size: 2em; }
            .nav-grid { grid-template-columns: repeat(2, 1fr); }
            .characters-grid { grid-template-columns: 1fr; }
            .selected-char-preview { flex-direction: column; text-align: center; }
            .selected-char-stats { width: 100%; }
            .action-buttons { flex-direction: column; }
            .console-controls { grid-template-columns: 1fr; }
            .console-stats { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 480px) {
            .nav-grid { grid-template-columns: 1fr; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg"></div>
    
    <div class="container">
        <h1 class="title">Мой <span>аккаунт</span> и персонажи</h1>
        
        <div class="navigation-panel">
            <h3 class="nav-title">
                <i class="fas fa-compass"></i> Навигация по сайту
            </h3>
            <div id="navGrid" class="nav-grid"></div>
        </div>
        
        <div class="content-wrapper">
            <div id="authForm" class="auth-box">
                <h2 class="auth-title">Регистрация и вход</h2>
                
                <div class="form-group">
                    <label for="username">👤 Логин:</label>
                    <input type="text" id="username" placeholder="Введите логин">
                </div>
                
                <div class="form-group">
                    <label for="password">🔒 Пароль:</label>
                    <input type="password" id="password" placeholder="Введите пароль">
                </div>
                
                <div id="message" class="message"></div>
                
                <div class="auth-buttons">
                    <button class="auth-btn login-btn" onclick="login()">Войти</button>
                    <button class="auth-btn register-btn" onclick="register()">Регистрация</button>
                </div>
            </div>
            
            <div id="userPanel" class="user-panel">
                <div class="user-info">
                    <h3>Добро пожаловать!</h3>
                    <p>Вы вошли как: <strong id="currentUser">Пользователь</strong></p>
                    <div id="adminBadge" class="admin-badge-inline" style="display: none;">👑 Администратор</div>
                    <div id="assistantBadge" class="assistant-badge-inline" style="display: none;">🛠️ Ассистент</div>
                    
                    <div class="user-stats">
                        <div class="stat-item">
                            <div class="stat-value" id="userId">0</div>
                            <div class="stat-label">ID</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="charCount">0</div>
                            <div class="stat-label">Персонажей</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="createdDate">-</div>
                            <div class="stat-label">Аккаунт создан</div>
                        </div>
                    </div>
                </div>
                
                <div class="character-section">
                    <h3 class="section-title">
                        <span>👤</span> Мои персонажи
                    </h3>
                    
                    <div id="charactersList" class="characters-grid"></div>
                    
                    <div id="selectedCharacterInfo" class="selected-character-info">
                        <div class="selected-char-header">
                            <div class="selected-char-title">Выбранный персонаж</div>
                            <button class="character-action-btn delete-btn" onclick="deselectCharacter()">
                                ✕ Отменить выбор
                            </button>
                        </div>
                        
                        <div class="selected-char-preview">
                            <div id="selectedCharVisual" class="selected-char-visual">👤</div>
                            <div class="selected-char-stats">
                                <div class="char-stat-row">
                                    <div class="char-stat-name">Имя:</div>
                                    <div class="char-stat-value" id="selectedCharName">-</div>
                                </div>
                                <div class="char-stat-row">
                                    <div class="char-stat-name">Класс:</div>
                                    <div class="char-stat-value" id="selectedCharClass">-</div>
                                </div>

        // ===== КЛАСС ДЛЯ РАБОТЫ С FIREBASE =====
        class FirebaseDatabase {
            constructor() {
                this.dbName = 'character_creator_db';
                this.cache = null;
            }

            // Загрузка данных из Firebase
            async loadFromFirebase() {
                try {
                    const docRef = firestore.collection('game_data').doc('main_database');
                    const docSnap = await docRef.get();
                    
                    if (docSnap.exists) {
                        this.cache = docSnap.data().data;
                        console.log('✅ Данные загружены из Firebase');
                        return this.cache;
                    } else {
                        console.log('📦 Firebase пуст, загружаем начальные данные');
                        await this.saveToFirebase(initialDatabase);
                        this.cache = initialDatabase;
                        return initialDatabase;
                    }
                } catch (error) {
                    console.error('❌ Ошибка загрузки из Firebase:', error);
                    this.cache = initialDatabase;
                    return initialDatabase;
                }
            }

            // Сохранение данных в Firebase
            async saveToFirebase(data) {
                try {
                    const docRef = firestore.collection('game_data').doc('main_database');
                    await docRef.set({ 
                        data: data,
                        lastUpdated: new Date().toISOString() 
                    });
                    this.cache = data;
                    console.log('✅ Данные сохранены в Firebase');
                    return true;
                } catch (error) {
                    console.error('❌ Ошибка сохранения в Firebase:', error);
                    return false;
                }
            }

            // Получить данные (из кэша или Firebase)
            async getData() {
                if (!this.cache) {
                    await this.loadFromFirebase();
                }
                return this.cache;
            }

            // ===== ПОЛЬЗОВАТЕЛИ =====

            async registerUser(username, password) {
                const db = await this.getData();
                
                // Проверяем существование пользователя
                const existingUser = db.users.find(user => user.username.toLowerCase() === username.toLowerCase());
                if (existingUser) {
                    return { success: false, message: 'Пользователь уже существует' };
                }
                
                // Создаем нового пользователя
                const newUser = {
                    id: db.nextId++,
                    username: username,
                    password: password,
                    created: new Date().toISOString(),
                    lastLogin: new Date().toISOString(),
                    loginCount: 1,
                    isAdmin: false,
                    isAssistant: false
                };
                
                db.users.push(newUser);
                await this.saveToFirebase(db);
                
                return { 
                    success: true, 
                    message: 'Регистрация успешна!',
                    user: { 
                        id: newUser.id, 
                        username: newUser.username,
                        created: newUser.created,
                        loginCount: newUser.loginCount,
                        isAdmin: false,
                        isAssistant: false
                    }
                };
            }

            async loginUser(username, password) {
                const db = await this.getData();
                
                const user = db.users.find(u => u.username === username && u.password === password);
                
                if (user) {
                    user.lastLogin = new Date().toISOString();
                    user.loginCount = (user.loginCount || 0) + 1;
                    await this.saveToFirebase(db);
                    
                    return { 
                        success: true, 
                        user: { 
                            id: user.id, 
                            username: user.username,
                            created: user.created,
                            loginCount: user.loginCount,
                            isAdmin: user.isAdmin || false,
                            isAssistant: user.isAssistant || false
                        }
                    };
                } else {
                    return { 
                        success: false, 
                        message: 'Неверный логин или пароль' 
                    };
                }
            }

            async getUserById(userId) {
                const db = await this.getData();
                const user = db.users.find(u => u.id === userId);
                
                if (user) {
                    return { 
                        success: true, 
                        user: { 
                            id: user.id, 
                            username: user.username,
                            created: user.created,
                            loginCount: user.loginCount || 1,
                            isAdmin: user.isAdmin || false,
                            isAssistant: user.isAssistant || false
                        }
                    };
                } else {
                    return { 
                        success: false, 
                        message: 'Пользователь не найден' 
                    };
                }
            }

            // ===== ПЕРСОНАЖИ =====

            async getUserCharacters(userId) {
                const db = await this.getData();
                const characters = db.characters?.filter(char => char.userId === userId) || [];
                return characters.sort((a, b) => new Date(b.created) - new Date(a.created));
            }

            async getAllCharacters() {
                const db = await this.getData();
                return db.characters || [];

            async getUserCharacterCount(userId) {
                const characters = await this.getUserCharacters(userId);
                return characters.length;

            async getCharacterById(charId) {
                const db = await this.getData();
                const character = db.characters?.find(char => char.id === charId);
                
                if (character) {
                    return { success: true, character: character };
                } else {
                    return { success: false, message: 'Персонаж не найден' };
                }

            async createCharacter(userId, characterData) {
                const db = await this.getData();
                
                const newCharId = db.nextCharId++;
                
                const newCharacter = {
                    id: newCharId,
                    userId: userId,
                    name: characterData.name,
                    face: characterData.face || "Обычное",
                    skin: characterData.skin || "Светлый",

                    accessory: characterData.accessory || "Нет",
                    avatar: characterData.avatar || "👤",
                    created: new Date().toISOString(),
                };
                
                if (!db.characters) db.characters = [];
                db.characters.push(newCharacter);
                await this.saveToFirebase(db);
                
                return { 
                    success: true, 
                    message: 'Персонаж создан!',
                    character: newCharacter 
                };
            }

            async deleteCharacter(charId) {
                const db = await this.getData();
                const charIndex = db.characters?.findIndex(char => char.id === charId);
                
                if (charIndex === -1 || charIndex === undefined) {
                    return { success: false, message: 'Персонаж не найден' };
                }
                
                const deletedChar = db.characters[charIndex];
                db.characters.splice(charIndex, 1);
                await this.saveToFirebase(db);
                
                return { 
                    success: true, 
                    message: 'Персонаж удален!',
                    character: deletedChar
                };
            }

            getUserSelectedCharacter(userId) {
                const selectedCharId = localStorage.getItem(`selected_char_${userId}`);
                if (selectedCharId) {
                    return this.getCharacterById(parseInt(selectedCharId));
                }
                return { success: false, message: 'Персонаж не выбран' };
            }

            setUserSelectedCharacter(userId, charId) {
                localStorage.setItem(`selected_char_${userId}`, charId);
                return { success: true };
            }

            clearUserSelectedCharacter(userId) {
                localStorage.removeItem(`selected_char_${userId}`);
                return { success: true };
            }

                    lastBackup: localStorage.getItem('last_backup_time') || 'Никогда'
                };
            }

            consoleEl.innerHTML = `<span style="color: #888">[${timestamp}]</span> <span style="color: ${color}">${text}</span>\n` + consoleEl.innerHTML;

            document.getElementById('currentUser').textContent = user.username;

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            
            const result = await firebaseDb.loginUser(username, password);
            
            if (result.success) {
                showMessage('✅ Вход выполнен успешно!', 'success');
                await showUserPanel(result.user);
            } else {
                showMessage(`❌ ${result.message}`, 'error');
            }
        }
        
        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            
            if (username.length < 3) {
                showMessage('Логин должен быть не менее 3 символов', 'error');
                return;
            }
            
            if (password.length < 4) {
                showMessage('Пароль должен быть не менее 4 символов', 'error');
                return;
            }
            
            const result = await firebaseDb.registerUser(username, password);
            
            if (result.success) {
                showMessage(`✅ ${result.message}`, 'success');
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                
                setTimeout(async () => {
                    await showUserPanel(result.user);
                }, 1000);
            } else {
                showMessage(`❌ ${result.message}`, 'error');
            }
        }

            const characters = await firebaseDb.getUserCharacters(currentUser.id);
            const charactersList = document.getElementById('charactersList');
            
            charactersList.innerHTML = '';
            
            if (characters.length === 0) {
                charactersList.innerHTML = `

                    </div>
                `;
            } else {
                characters.forEach(character => {
                    const characterCard = document.createElement('div');
                    characterCard.className = 'character-card';
                    characterCard.dataset.charId = character.id;
                    
                    if (selectedCharacter && selectedCharacter.id === character.id) {
                        characterCard.classList.add('selected');

                    const createdDate = new Date(character.created);
                    const formattedDate = createdDate.toLocaleDateString();
                    
                    characterCard.innerHTML = `

                            </button>
                            <button class="character-action-btn delete-btn" onclick="deleteCharacter(${character.id})">
                                Удалить
                            </button>
                        </div>
                    `;
                    
                    charactersList.appendChild(characterCard);
                });
            }
            
            document.getElementById('charCount').textContent = characters.length;
        }
        
        async function loadSelectedCharacter() {
            if (!currentUser) return;
            
            const result = await firebaseDb.getUserSelectedCharacter(currentUser.id);
            const selectedInfo = document.getElementById('selectedCharacterInfo');
            
            if (result.success) {
                selectedCharacter = result.character;
                selectedInfo.classList.add('show');
                
                document.getElementById('selectedCharVisual').textContent = result.character.avatar || '👤';
                document.getElementById('selectedCharName').textContent = result.character.name;
                document.getElementById('selectedCharClass').textContent = result.character.face || 'Обычное';
                
                const createdDate = new Date(result.character.created);
                document.getElementById('selectedCharCreated').textContent = createdDate.toLocaleString();
                
                document.querySelectorAll('.character-card').forEach(card => {
                    card.classList.remove('selected');
                    if (parseInt(card.dataset.charId) === result.character.id) {
                        card.classList.add('selected');
                    }
                });
            } else {
                selectedCharacter = null;
                selectedInfo.classList.remove('show');
            }
        }
        
        function selectCharacter(charId) {
            if (!currentUser) return;
            
            const result = firebaseDb.setUserSelectedCharacter(currentUser.id, charId);
            if (result.success) {
                loadSelectedCharacter();
                showMessage('✅ Персонаж выбран!', 'success');
            }

        function deselectCharacter() {
            if (!currentUser) return;
            
            const result = firebaseDb.clearUserSelectedCharacter(currentUser.id);
            if (result.success) {
                selectedCharacter = null;
                document.getElementById('selectedCharacterInfo').classList.remove('show');
                showMessage('✅ Выбор персонажа отменен', 'success');
                
                document.querySelectorAll('.character-card').forEach(card => {
                    card.classList.remove('selected');
                });
            }
        }
        
        async function deleteCharacter(charId) {
            if (!confirm('Вы уверены, что хотите удалить этого персонажа?')) {
                return;
            }
            
            const result = await firebaseDb.deleteCharacter(charId);
            if (result.success) {
                if (selectedCharacter && selectedCharacter.id === charId) {
                    deselectCharacter();
                }
                
                await loadUserCharacters();
                showMessage('✅ Персонаж удален', 'success');
            } else {
                showMessage(`❌ ${result.message}`, 'error');
            }
        }

            if (!currentUser || !currentUser.isAdmin) return;
            
            const stats = await firebaseDb.getDatabaseStats();
            
            const userCountEl = document.getElementById('consoleUserCount');
            const charCountEl = document.getElementById('consoleCharCount');
            const dbSizeEl = document.getElementById('consoleDbSize');
            
            if (userCountEl) userCountEl.textContent = stats.users;
            if (charCountEl) charCountEl.textContent = stats.characters;
            if (dbSizeEl) dbSizeEl.textContent = stats.dbSize;
        }
        
        async function downloadDatabase() {
            if (!currentUser || !currentUser.isAdmin) {
                showConsoleMessage('Доступ запрещен! Только для администраторов.', 'error');
                return;
            }
            
            try {
                const data = await firebaseDb.exportDatabase();
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const filename = `character_database_backup_${timestamp}.json`;
                
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showConsoleMessage(`База данных скачана как ${filename}`, 'success');
            } catch (error) {
                showConsoleMessage(`Ошибка при скачивании: ${error.message}`, 'error');
            }
        }
        
        async function restoreSession() {
            const savedUser = localStorage.getItem('currentUser');
            
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    const userCheck = await firebaseDb.getUserById(user.id);
                    
                    if (userCheck.success) {
                        await showUserPanel(userCheck.user);
                    } else {
                        localStorage.removeItem('currentUser');
                    }
                } catch (e) {
                    localStorage.removeItem('currentUser');
                }
            }
        }
        
        // Запускаем при загрузке
        window.addEventListener('load', function() {
            initializeApp();
            updateNavigationPanel(false);
            
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            
            function handleEnterKey(e) {
                if (e.key === 'Enter') {
                    if (document.getElementById('authForm').style.display !== 'none') {
                        login();
                    }
                }
            }
            
            usernameInput.addEventListener('keypress', handleEnterKey);
            passwordInput.addEventListener('keypress', handleEnterKey);
        });
    </script>
</body>
</html>
